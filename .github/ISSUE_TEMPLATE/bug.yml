name: Bug Report
description: Report a bug in laravel-pgp-mailer
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Before submitting, please check
        existing issues to avoid duplicates. For **security-sensitive bugs**
        (e.g. key leakage, plaintext on the wire), please use
        [private vulnerability reporting](https://github.com/vpsbg/laravel-pgp-mailer/security/advisories/new)
        instead of this form.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences — what went wrong?
      placeholder: "Mail::to() with a recipient that has a stored key sends plaintext instead of multipart/encrypted."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Minimal steps to reproduce. Include the relevant `pgp-mailer` config
        values, the `PgpKey::store()` call (or how the key got into the DB),
        and the `Mail::to(...)->send(...)` call. Code blocks welcome.
      placeholder: |
        1. config('pgp-mailer.signing.enabled') = true, signing key set via env
        2. PgpKey::store('user@example.com', file_get_contents('key.asc'))
        3. Mail::to('user@example.com')->send(new InvoiceMail($invoice))
        4. Mailpit shows text/plain, not multipart/encrypted
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behavior
      placeholder: |
        Expected: multipart/encrypted with embedded signature
        Actual:   text/plain, no PGP processing
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Paste the output of:
        ```
        composer show vpsbg/laravel-pgp-mailer | grep -E 'versions|name'
        php -v
        php -r 'echo extension_loaded("gnupg") ? "gnupg: loaded\n" : "gnupg: MISSING\n";'
        php -r 'echo "laravel: " . \Illuminate\Foundation\Application::VERSION . "\n";' 2>/dev/null || true
        ```
      render: shell
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Which path is affected?
      description: Best-guess is fine — you can tick more than one.
      multiple: true
      options:
        - Sign+encrypt (multipart/encrypted)
        - Sign-only (multipart/signed)
        - Split-recipients (mixed keyed/unkeyed audience)
        - Opt-out headers (X-Pgp-Mailer-Disable / -No-Encrypt)
        - Key storage / rotation / UID refresh (PgpKey::store)
        - Listener is unexpectedly a no-op
        - Engine / gnupg PECL interaction
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: relevant-config
    attributes:
      label: Relevant config values
      description: |
        Only the knobs that matter — don't paste the whole config file.
        Common ones: `missing_key_policy`, `engine_failure_policy`,
        `unmatched_sender_policy`, `signing.enabled`, `sign_only.split_recipients`,
        `require_uid_match`, `homedir`.
      render: php
      placeholder: |
        'missing_key_policy' => 'sign_only',
        'engine_failure_policy' => 'drop',
        'sign_only' => ['split_recipients' => true],
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error / stack trace / logs
      description: |
        Any exception trace, `laravel.log` excerpt, or stderr output from the
        gnupg engine. Redact key material and recipient addresses.
      render: shell
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else that might be relevant (Horizon vs sync queue, persistent vs ephemeral homedir, mail driver, etc.)
    validations:
      required: false
